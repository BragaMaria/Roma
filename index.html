<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сайт Ромчика</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .btn {
            background: #ff6b35;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #c44112;
            transition: 0.1s linear;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #c44112;
            background: #ff7f4a;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #c44112;
        }
    </style>
</head>
<body>

    <a href="./pageMenu/index.html">
        <button class="btn">🚀 Перейти на сайт</button>
    </a>

</body>
</html>
