<!DOCTYPE html>
<html>
<head>
    <style>
        .video-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
        }
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        .time-display {
            font-family: monospace;
            font-size: 14px;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
        h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #333;">🎬 Два видео с управлением 🎬</h1>
    
   
    <div class="video-container">
       
        <video id="video1" src="../11845967874678.mp4"></video>
        
        <div class="controls">
            <button id="playPauseBtn1">▶️ Воспроизвести</button>
            <button id="restartBtn1">🔄 Заново</button>
            <input type="range" id="volumeSlider1" min="0" max="1" step="0.01" value="1">
            <span id="timeDisplay1" class="time-display">0:00 / 0:00</span>
        </div>
    </div>

    
    <div class="video-container">
        
        <video id="video2" src="../10345774910053.mp4"></video>
        
        <div class="controls">
            <button id="playPauseBtn2">▶️ Воспроизвести</button>
            <button id="restartBtn2">🔄 Заново</button>
            <input type="range" id="volumeSlider2" min="0" max="1" step="0.01" value="1">
            <span id="timeDisplay2" class="time-display">0:00 / 0:00</span>
        </div>
    </div>

    

    <div class="video-container">
        
        <video id="video4" src="../vkclips_20260613024249.mp4"></video>
        
        <div class="controls">
            <button id="playPauseBtn2">▶️ Воспроизвести</button>
            <button id="restartBtn2">🔄 Заново</button>
            <input type="range" id="volumeSlider2" min="0" max="1" step="0.01" value="1">
            <span id="timeDisplay2" class="time-display">0:00 / 0:00</span>
        </div>
    </div>

    <script>
        // Функция для создания управления видео
        function setupVideoControls(videoId, playPauseId, restartId, volumeId, timeId) {
            const video = document.getElementById(videoId);
            const playPauseBtn = document.getElementById(playPauseId);
            const restartBtn = document.getElementById(restartId);
            const volumeSlider = document.getElementById(volumeId);
            const timeDisplay = document.getElementById(timeId);
            
            if (!video) return;
            
            // Кнопка паузы/воспроизведения
            playPauseBtn.onclick = () => {
                if (video.paused) {
                    video.play();
                    playPauseBtn.textContent = '⏸️ Пауза';
                } else {
                    video.pause();
                    playPauseBtn.textContent = '▶️ Воспроизвести';
                }
            };
            
            // Кнопка "Заново"
            restartBtn.onclick = () => {
                video.currentTime = 0;
                video.play();
                playPauseBtn.textContent = '⏸️ Пауза';
            };
            
            // Громкость
            volumeSlider.oninput = () => {
                video.volume = volumeSlider.value;
            };
            
            // Отображение времени
            video.ontimeupdate = () => {
                if (video.duration) {
                    const currentMinutes = Math.floor(video.currentTime / 60);
                    const currentSeconds = Math.floor(video.currentTime % 60);
                    const totalMinutes = Math.floor(video.duration / 60);
                    const totalSeconds = Math.floor(video.duration % 60);
                    
                    timeDisplay.textContent = `${currentMinutes}:${currentSeconds.toString().padStart(2, '0')} / ${totalMinutes}:${totalSeconds.toString().padStart(2, '0')}`;
                }
            };
            
            // Обновляем кнопку при окончании видео
            video.onended = () => {
                playPauseBtn.textContent = '▶️ Воспроизвести';
            };
            
            // При загрузке видео обновляем отображение времени
            video.onloadedmetadata = () => {
                const totalMinutes = Math.floor(video.duration / 60);
                const totalSeconds = Math.floor(video.duration % 60);
                timeDisplay.textContent = `0:00 / ${totalMinutes}:${totalSeconds.toString().padStart(2, '0')}`;
            };
        }
        
        // Настраиваем оба видео
        setupVideoControls('video1', 'playPauseBtn1', 'restartBtn1', 'volumeSlider1', 'timeDisplay1');
        setupVideoControls('video2', 'playPauseBtn2', 'restartBtn2', 'volumeSlider2', 'timeDisplay2');
        
        console.log('✅ Оба видео готовы к воспроизведению!');
    </script>
</body>
</html>
